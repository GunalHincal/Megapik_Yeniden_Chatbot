<!-- Kullanıcı arayüzü için HTML dosyası -->

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megapik 'Yeniden' Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Faviconlar Başlangıç -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <!-- Opsiyonel: Tema rengi -->
    <meta name="theme-color" content="#000000">
    <!-- Faviconlar Bitiş -->

</head>
<body>
    <div class="chat-container">
        <img src="/static/megapik_cover.jpeg" alt="Megapik Kitap Kapağı" class="book-cover"> <!-- 📌 Kitap Kapağı -->
        <h1 class="chat-title">📖 Megapik 'Yeniden' Chatbot</h1>
        <div id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Sorunuzu yazın..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
